<!DOCTYPE html>
<html>
<head>
  <title>Quiz App</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4e73df, #1cc88a);
    }

    .navbar {
      background-color: #222;
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      margin-left: 15px;
    }

    .container {
      width: 90%;
      max-width: 700px;
      margin: 50px auto;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      margin-bottom: 20px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      padding: 10px 20px;
      border: none;
      background-color: #4e73df;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #2e59d9;
    }

    .logout-btn {
      background-color: #e74a3b;
    }

    .logout-btn:hover {
      background-color: #c0392b;
    }

    .center {
      text-align: center;
    }
  </style>
</head>
<body>

{% if session.get('user_id') %}
<div class="navbar">
  <div>Quiz App</div>
  <div>
    Welcome, {{ session['username'] }}
    <a href="/logout">Logout</a>
  </div>
</div>
{% endif %}

<div class="container">
  {% block content %}
  {% endblock %}
</div>

</body>
</html>
